# Konfigurasi build Railway / Nixpacks untuk Laravel 12 + Midtrans + Mail
# Dokumentasi: https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20"]
nixLibs = ["libxml2", "zlib", "libpng", "libjpeg"]
aptPkgs = ["git", "unzip"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan storage:link || true",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"

[variables]
NIXPACKS_PHP_FALLBACK_PATH = "/app/public"
NIXPACKS_PHP_ROOT_DIR = "/app/public"
